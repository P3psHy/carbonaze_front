server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression gzip pour de meilleures performances
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Cache les assets Angular (fichiers avec hash dans le nom)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ⚠️  IMPORTANT : redirige toutes les routes vers index.html
    # Sans ça, un refresh sur /dashboard retourne une 404 Nginx
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Désactive les logs pour les favicon (évite le bruit dans les logs)
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
