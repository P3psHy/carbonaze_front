<header class="app-topbar-shell">
  <div class="page-frame app-topbar-frame">
    <div class="topbar panel rounded-[30px] px-5 py-4 sm:px-6">
      <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
        <button
          type="button"
          class="brand-home-button flex items-center gap-4 text-left"
          (click)="goToHome()"
          aria-label="Retourner a l'accueil Carbonaze"
        >
          <div class="brand-mark" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>

          <div>
            <p class="font-heading text-xl font-semibold tracking-[-0.03em] text-[var(--ink)]">Carbonaze</p>
            <p class="text-sm text-[var(--muted)]">Plateforme de calcul et d'analyse des émissions CO2</p>
          </div>
        </button>

        <div class="flex flex-col gap-3 sm:flex-row sm:items-center">
          <nav class="hidden items-center gap-2 rounded-full bg-white/60 p-1 text-sm text-[var(--muted)] md:flex">
            <a
              class="nav-pill"
              [routerLink]="['/']"
              routerLinkActive="nav-pill-active"
              [routerLinkActiveOptions]="{ exact: true }"
            >
              Accueil
            </a>
            <a class="nav-pill" [routerLink]="['/calculs']" routerLinkActive="nav-pill-active">Calculs</a>
          </nav>

          <div class="status-chip">
            <span class="status-dot"></span>
            Pilotage carbone
          </div>
        </div>
      </div>
    </div>
  </div>
</header>

<div class="app-content">
  <router-outlet></router-outlet>
</div>

<app-calculator-settings-button></app-calculator-settings-button>
